name: Test Package

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-package:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Temporarily disabled Windows tests - fixing in follow-up PR
        # os: [ubuntu-latest, macos-latest, windows-latest]
        os: [ubuntu-latest, macos-latest]
        node: [16, 18, 20]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      
      - name: Install dependencies
        run: bun install --frozen-lockfile
      
      - name: Build project
        run: bun run build
      
      - name: Create package
        run: bun pm pack
      
      - name: Test installation (Unix)
        if: runner.os != 'Windows'
        run: |
          # Create test directory
          mkdir test-install
          cd test-install
          bun init -y
          
          # Install the package
          bun add ../*.tgz
          
          # Test CLI works
          ./node_modules/.bin/graphyn --version
          ./node_modules/.bin/graphyn --help
      
      - name: Test installation (Windows)
        if: runner.os == 'Windows'
        run: |
          # Create test directory
          mkdir test-install
          cd test-install
          bun init -y
          
          # Install the package
          $package = Get-ChildItem .. -Filter "*.tgz" | Select-Object -First 1
          bun add $package.FullName
          
          # Test CLI works
          ./node_modules/.bin/graphyn --version
          ./node_modules/.bin/graphyn --help
